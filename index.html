<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adivina el número</title>

<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #141e30, #243b55);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .contenedor {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(15px);
        border-radius: 20px;
        padding: 30px;
        text-align: center;
        width: 320px;
        color: white;
        box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        animation: aparecer 0.6s ease;
    }

    @keyframes aparecer {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    h1 {
        margin-bottom: 20px;
        font-weight: 600;
        letter-spacing: 1px;
    }

    input {
        width: 85%;
        padding: 12px;
        font-size: 16px;
        margin-bottom: 20px;
        border-radius: 12px;
        border: none;
        outline: none;
        text-align: center;
        background: rgba(255,255,255,0.2);
        color: white;
        transition: 0.3s;
    }

    input::placeholder {
        color: #ddd;
    }

    input:focus {
        background: rgba(255,255,255,0.3);
        transform: scale(1.05);
    }

    button {
        padding: 12px 18px;
        margin: 5px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-size: 14px;
        transition: 0.3s;
    }

    .comprobar {
        background: linear-gradient(135deg, #00c9ff, #92fe9d);
        color: #000;
    }

    .reiniciar {
        background: linear-gradient(135deg, #ff416c, #ff4b2b);
        color: white;
    }

    button:hover {
        transform: scale(1.1);
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    #resultado {
        margin-top: 15px;
        font-weight: bold;
        font-size: 16px;
        min-height: 20px;
    }
</style>
</head>

<body>

<div class="contenedor">
    <h1>Adivina el número</h1>

    <input type="number" id="numeroUsuario" placeholder="Escribe un número">

    <br>

    <button class="comprobar" onclick="comprobarNumero()">Comprobar</button>
    <button class="reiniciar" onclick="reiniciarJuego()">Reiniciar</button>

    <p id="resultado"></p>
</div>

<script>
    let numeroSecreto = Math.floor(Math.random() * 100) + 1;

    function comprobarNumero() {
        let input = document.getElementById("numeroUsuario").value;
        let resultado = document.getElementById("resultado");

        if (input === "") {
            resultado.textContent = "Escribe un número";
            return;
        }

        let numeroUsuario = Number(input);

        if (numeroUsuario < numeroSecreto) {
            resultado.textContent = "El número es mayor";
        } else if (numeroUsuario > numeroSecreto) {
            resultado.textContent = "El número es menor";
        } else {
            resultado.textContent = "¡ADIVINASTE!";
        }
    }

    function reiniciarJuego() {
        numeroSecreto = Math.floor(Math.random() * 100) + 1;
        document.getElementById("numeroUsuario").value = "";
        document.getElementById("resultado").textContent = "";
    }
</script>

</body>
</html>
